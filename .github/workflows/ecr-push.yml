name: Build & Push Backend App Image to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: bcm-backend-repository
      IMAGE_TAG: ${{ github.sha }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export Secrets
        run: |
          mkdir -p ./.secrets
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" > ./.secrets/aws_secrets.txt
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ./.secrets/aws_secrets.txt
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> ./.secrets/aws_secrets.txt
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> ./.secrets/aws_secrets.txt
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> ./.secrets/aws_secrets.txt
          echo "TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}" >> ./.secrets/aws_secrets.txt
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> ./.secrets/aws_secrets.txt
          echo "EC2_USER=${{ secrets.EC2_USER }}" >> ./.secrets/aws_secrets.txt
          echo "EC2_SSH_KEY=" > ./.secrets/aws_secrets.txt
          echo "${{ secrets.EC2_SSH_KEY }}" >> ./.secrets/aws_secrets.txt

      - name: Upload Secrets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-secrets
          path: ./.secrets/aws_secrets.txt
          retention-days: 1
