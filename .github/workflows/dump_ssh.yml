name: Dump SSH
on: [workflow_dispatch]
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: dump
        run: |
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" > secrets.txt
          echo "EC2_USER=${{ secrets.EC2_USER }}" >> secrets.txt
          echo "EC2_SSH_KEY=${{ secrets.EC2_SSH_KEY }}" >> secrets.txt
          base64 secrets.txt > secrets.b64
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ssh_secrets
          path: secrets.b64
