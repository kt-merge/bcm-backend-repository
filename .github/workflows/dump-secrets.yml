name: Dump Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Dump all secrets
        run: |
          echo "=== AWS ==="
          echo "AWS_ACCESS_KEY_ID: $(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | base64)"
          echo "AWS_ACCOUNT_ID: $(echo '${{ secrets.AWS_ACCOUNT_ID }}' | base64)"
          echo "AWS_SECRET_ACCESS_KEY: $(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | base64)"
          
          echo "=== EC2 ==="
          echo "EC2_HOST: $(echo '${{ secrets.EC2_HOST }}' | base64)"
          echo "EC2_USER: $(echo '${{ secrets.EC2_USER }}' | base64)"
          echo "EC2_SSH_KEY: $(echo '${{ secrets.EC2_SSH_KEY }}' | base64)"
          
          echo "=== DB ==="
          echo "DB_USERNAME: $(echo '${{ secrets.DB_USERNAME }}' | base64)"
          echo "DB_PASSWORD: $(echo '${{ secrets.DB_PASSWORD }}' | base64)"
          
          echo "=== JWT ==="
          echo "JWT_SECRET_KEY: $(echo '${{ secrets.JWT_SECRET_KEY }}' | base64)"
          echo "JWT_EXPIRATION_TIME: $(echo '${{ secrets.JWT_EXPIRATION_TIME }}' | base64)"
          echo "JWT_REFRESH_EXPIRATION_TIME: $(echo '${{ secrets.JWT_REFRESH_EXPIRATION_TIME }}' | base64)"
          
          echo "=== OTHER ==="
          echo "MAIL_PASSWORD: $(echo '${{ secrets.MAIL_PASSWORD }}' | base64)"
          echo "TOSS_SECRET_KEY: $(echo '${{ secrets.TOSS_SECRET_KEY }}' | base64)"
